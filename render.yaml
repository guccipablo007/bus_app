services:
  - type: web
    name: cameroon-bus-api-staging
    runtime: node
    plan: free
    rootDir: .
    autoDeploy: false
    buildCommand: npx -y pnpm@11.8.0 install --frozen-lockfile && npx -y pnpm@11.8.0 --filter api build
    startCommand: npx -y pnpm@11.8.0 --filter api start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: staging
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ID_ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '*'
      - key: SUPABASE_DATABASE_NOTE
        value: Use Session Pooler connection string
